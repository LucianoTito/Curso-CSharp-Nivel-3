<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Web de prueba</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <script src="./script.js"></script>
    <h1>Pokedex</h1>
    <h2>Enciclopedia Pokémon</h2>
    <p>En este sitio puedes encontrar información sobre los Pokémon.</p>
    <img src="https://www.pokemon.com/static-assets/content-assets/cms2/img/pokedex/detail/008.png" alt="Imagen de Wartortle">

    <table>
        <tr> <!-- Fila de encabezado -->
            <th>Nombre</th> <!-- Encabezado de la columna -->
            <th>Tipo</th>
            <th>Habilidad</th>
        </tr>
        <tr> <!-- Fila de datos -->
            <td>Wartortle</td> <!-- Celda de datos -->
            <td>Agua</td>
            <td>Burbuja</td>
        </tr>
    </table>

    <div>
        <label for="">User: </label>
        <input id="txtUser" type="text" placeholder="Ingrese su nombre">
    </div>

    <div>
        <label for="">Password: </label>
        <input id="txtPass" type="password" placeholder="Ingrese su contraseña">
    </div>

    <div>
        <button id="btnLogin" onclick="login()">Login</button>
    </div>
</body>
</html>
